<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Core v1.3 Final</title>
    <style>
        :root {
            --accent: #007aff;
            --bg: #0e0e0e;
            --card: #1a1a1a;
            --rbow: linear-gradient(90deg, #f00, #ff8000, #ff0, #0f0, #00f, #8b00ff);
        }
        body {
            background: var(--bg);
            color: #eee;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 15px;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .container { max-width: 400px; width: 100%; }
        .card {
            background: var(--card);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { color: var(--accent); letter-spacing: 2px; margin: 25px 0 5px 0; cursor: pointer; user-select: none; }
        .sub { color: #555; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 25px; }
        
        .tabs { display: flex; background: #222; border-radius: 10px; padding: 3px; margin: 15px 0; border: 1px solid #333; }
        .tab { flex: 1; padding: 10px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; color: #666; font-weight: bold; }
        .active-tab { background: #333; color: var(--accent); }
        
        input[type='color'] { width: 100%; height: 45px; border: none; border-radius: 10px; background: #222; padding: 4px; box-sizing: border-box; }
        input[type='range'] { width: 100%; margin: 15px 0; accent-color: var(--accent); }
        
        button { width: 100%; padding: 16px; margin: 10px 0; border-radius: 12px; border: none; background: #2a2a2a; color: white; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-sr { background: var(--accent); margin-bottom: 20px; font-size: 1rem; }
        .btn-sync { background: #ffa500; color: black; }
        .btn-rst { background: #331111; color: #ff5555; font-size: 0.7rem; margin-top: 30px; border: 1px solid #442222; }
        
        .toggle-box { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 12px; border-radius: 12px; margin: 10px 0; border: 1px solid #222; }
        .drop-content { display: none; padding-top: 10px; }
        .debug-text { display: none; font-family: monospace; font-size: 0.65rem; color: #0f0; text-align: left; background: #000; padding: 12px; border-radius: 10px; border: 1px solid #0f0; margin-top: 15px; }
        
        label { font-size: 0.65rem; color: #888; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 5px; }
        .rbow-st { padding: 15px; background: var(--rbow); border-radius: 10px; margin-top: 10px; font-size: 0.75rem; font-weight: bold; color: white; text-shadow: 1px 1px 2px #000; }
        .val-label { color: var(--accent); float: right; }
    </style>
</head>
<body>

    <div class="container">
        <h1 onclick="dCheck()">AURA CORE</h1>
        <div class="sub">Universal Logic Controller</div>

        <div class="card">
            <label>Brightness <span id="bPct" class="val-label">78%</span></label>
            <input type="range" min="0" max="255" value="200" oninput="uB(this.value)">
        </div>

        <div class="card">
            <label>DRL Mode</label>
            <div class="tabs">
                <div onclick="sM('d','s')" id="tDS" class="tab active-tab">SOLID</div>
                <div onclick="sM('d','r')" id="tDR" class="tab">RAINBOW</div>
            </div>
            <div id="dSC"><input type="color" value="#E10000"></div>
            <div id="dRC" style="display:none;"><div class="rbow-st">RAINBOW ACTIVE</div></div>
        </div>

        <div class="card">
            <label>Turn Signal Mode</label>
            <div class="tabs">
                <div onclick="sM('t','s')" id="tTS" class="tab active-tab">SOLID</div>
                <div onclick="sM('t','r')" id="tTR" class="tab">RAINBOW</div>
            </div>
            <div id="tSC"><input type="color" value="#FFA500"></div>
            <div id="tRC" style="display:none;"><div class="rbow-st">SPECTRAL WIPE ACTIVE</div></div>
        </div>

        <button class="btn-sr" onclick="tS(this)">ACTIVATE SHOWROOM</button>

        <div class="card">
            <div onclick="toggleTuner()" style="cursor:pointer; user-select:none;">
                <span style="color:var(--accent); font-size:1.1rem; font-weight:bold; letter-spacing:1px;">TUNER TOOLS &#9662;</span>
            </div>
            
            <div id="tunerContent" class="drop-content">
                
                <div class="toggle-box" style="margin-top:20px;">
                    <span style="font-size: 0.8rem;">Swap Left/Right Sides</span>
                    <button id="invBtn" onclick="toggleInvert()" style="width:auto; padding:8px 15px; margin:0; font-size:0.7rem; background:#333;">NORMAL</button>
                </div>

                <div style="margin-top:20px;">
                    <label>Timing Fine-Tune <span id="fineVal" class="val-label">0ms</span></label>
                    <input type="range" min="-15" max="15" value="0" oninput="uF(this.value)">
                </div>

                <button class="btn-sync" onclick="this.innerText='WAITING FOR BLINKER...'">RE-LEARN BLINK TIMING</button>

                <div id="db" class="debug-text">
                    SPD: <span style="float:right">35ms</span><br>
                    OFFSET: <span id="dbOffset" style="float:right">0ms</span>
                </div>

                <button class="btn-rst" onclick="confirm('Proceed with Factory Reset?')">FACTORY RESET DEVICE</button>
            </div>
        </div>
    </div>

    <script>
        // Brightness % Calculation
        function uB(v) {
            let pct = Math.round((v / 255) * 100);
            document.getElementById('bPct').innerText = pct + '%';
        }

        // Live Slider for Fine Tune
        function uF(v) {
            document.getElementById('fineVal').innerText = v + 'ms';
            document.getElementById('dbOffset').innerText = v + 'ms';
        }

        // Dropdown Toggle
        function toggleTuner() {
            const content = document.getElementById('tunerContent');
            content.style.display = (content.style.display === 'block') ? 'none' : 'block';
        }

        // Secret Debug Toggle
        let tC = 0;
        function dCheck() {
            tC++;
            if(tC >= 3) { document.getElementById('db').style.display = 'block'; }
            setTimeout(() => tC = 0, 1000);
        }

        // UI View Switchers
        function sM(type, mode) {
            const isR = (mode === 'r');
            if(type === 'd') {
                document.getElementById('dSC').style.display = isR ? 'none' : 'block';
                document.getElementById('dRC').style.display = isR ? 'block' : 'none';
                document.getElementById('tDS').className = isR ? 'tab' : 'tab active-tab';
                document.getElementById('tDR').className = isR ? 'tab active-tab' : 'tab';
            } else {
                document.getElementById('tSC').style.display = isR ? 'none' : 'block';
                document.getElementById('tRC').style.display = isR ? 'block' : 'none';
                document.getElementById('tTS').className = isR ? 'tab' : 'tab active-tab';
                document.getElementById('tTR').className = isR ? 'tab active-tab' : 'tab';
            }
        }

        let inv = false;
        function toggleInvert() {
            inv = !inv;
            const btn = document.getElementById('invBtn');
            btn.innerText = inv ? "INVERTED" : "NORMAL";
            btn.style.background = inv ? "#ff0055" : "#333";
        }

        function tS(btn) {
            if(btn.innerText.includes('ACTIVATE')) {
                btn.innerText = 'DEACTIVATE SHOWROOM';
                btn.style.background = '#ff0055';
            } else {
                btn.innerText = 'ACTIVATE SHOWROOM';
                btn.style.background = '#007aff';
            }
        }
    </script>
</body>
</html>
